<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360">
  <rect width="980" height="360" fill="#f7f7f2"/>
  <text x="30" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#202020">When there is no class: use nearby labels, parents, and siblings</text>

  <rect x="60" y="80" width="820" height="220" rx="10" fill="#ffffff" stroke="#333333" stroke-width="2"/>
  <text x="85" y="118" font-family="Menlo, monospace" font-size="16" fill="#111111">&lt;dl class="metadata"&gt;</text>
  <text x="115" y="153" font-family="Menlo, monospace" font-size="16" fill="#111111">&lt;dt&gt;Published&lt;/dt&gt;</text>
  <text x="335" y="153" font-family="Menlo, monospace" font-size="16" fill="#111111">&lt;dd&gt;2026-06-24&lt;/dd&gt;</text>
  <text x="115" y="188" font-family="Menlo, monospace" font-size="16" fill="#111111">&lt;dt&gt;Author&lt;/dt&gt;</text>
  <text x="335" y="188" font-family="Menlo, monospace" font-size="16" fill="#111111">&lt;dd&gt;Noelle&lt;/dd&gt;</text>
  <text x="115" y="223" font-family="Menlo, monospace" font-size="16" fill="#111111">&lt;dt&gt;Topic&lt;/dt&gt;</text>
  <text x="335" y="223" font-family="Menlo, monospace" font-size="16" fill="#111111">&lt;dd&gt;Platform governance&lt;/dd&gt;</text>
  <text x="85" y="258" font-family="Menlo, monospace" font-size="16" fill="#111111">&lt;/dl&gt;</text>

  <rect x="108" y="133" width="175" height="28" fill="none" stroke="#0b7fab" stroke-width="4"/>
  <rect x="328" y="133" width="210" height="28" fill="none" stroke="#b23a48" stroke-width="4"/>
  <path d="M288 147 L322 147" stroke="#333333" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="585" y="153" font-family="Arial, sans-serif" font-size="16" fill="#202020">find the label, then get next sibling</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#333333"/>
    </marker>
  </defs>

  <text x="70" y="330" font-family="Arial, sans-serif" font-size="17" fill="#202020">Example: soup.find("dt", string="Published").find_next_sibling("dd").get_text(strip=True)</text>
</svg>
